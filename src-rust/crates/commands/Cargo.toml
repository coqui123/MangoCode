tool-doc-search = ["mangocode-query/tool-doc-search", "mangocode-tools/tool-doc-search", "mangocode-tui/tool-doc-search"]
tool-edit = ["mangocode-query/tool-edit", "mangocode-tools/tool-edit", "mangocode-tui/tool-edit"]
tool-enter-plan-mode = ["mangocode-query/tool-enter-plan-mode", "mangocode-tools/tool-enter-plan-mode", "mangocode-tui/tool-enter-plan-mode"]
