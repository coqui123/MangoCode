[package]
name = "mangocode-commands"
version.workspace = true
edition.workspace = true

[features]
default = ["proactive", "default-tools"]
proactive = [
    "mangocode-core/proactive",
    "mangocode-query/proactive",
    "mangocode-tui/proactive",
]
default-tools = [
    "mangocode-query/default-tools",
    "mangocode-tools/default-tools",
    "mangocode-tui/default-tools",
]
default-tools-no-web-research = [
    "mangocode-query/default-tools-no-web-research",
    "mangocode-tools/default-tools-no-web-research",
    "mangocode-tui/default-tools-no-web-research",
]
full-tools = [
    "mangocode-query/full-tools",
    "mangocode-tools/full-tools",
    "mangocode-tui/full-tools",
]
tool-agent = ["mangocode-query/tool-agent", "mangocode-tools/tool-agent", "mangocode-tui/tool-agent"]
tool-apply-patch = ["mangocode-query/tool-apply-patch", "mangocode-tools/tool-apply-patch", "mangocode-tui/tool-apply-patch"]
tool-ask-user = ["mangocode-query/tool-ask-user", "mangocode-tools/tool-ask-user", "mangocode-tui/tool-ask-user"]
tool-bash = ["mangocode-query/tool-bash", "mangocode-tools/tool-bash", "mangocode-tui/tool-bash"]
tool-batch-edit = ["mangocode-query/tool-batch-edit", "mangocode-tools/tool-batch-edit", "mangocode-tui/tool-batch-edit"]
tool-brief = ["mangocode-query/tool-brief", "mangocode-tools/tool-brief", "mangocode-tui/tool-brief"]
tool-browser = ["mangocode-query/tool-browser", "mangocode-tools/tool-browser", "mangocode-tui/tool-browser"]
tool-computer-use = ["mangocode-query/tool-computer-use", "mangocode-tools/tool-computer-use", "mangocode-tui/tool-computer-use"]
tool-config = ["mangocode-query/tool-config", "mangocode-tools/tool-config", "mangocode-tui/tool-config"]
tool-cron-create = ["mangocode-query/tool-cron-create", "mangocode-tools/tool-cron-create", "mangocode-tui/tool-cron-create"]
tool-cron-delete = ["mangocode-query/tool-cron-delete", "mangocode-tools/tool-cron-delete", "mangocode-tui/tool-cron-delete"]
tool-cron-list = ["mangocode-query/tool-cron-list", "mangocode-tools/tool-cron-list", "mangocode-tui/tool-cron-list"]
