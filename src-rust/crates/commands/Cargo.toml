tool-team-create = ["mangocode-query/tool-team-create", "mangocode-tools/tool-team-create", "mangocode-tui/tool-team-create"]
tool-team-delete = ["mangocode-query/tool-team-delete", "mangocode-tools/tool-team-delete", "mangocode-tui/tool-team-delete"]
tool-todo-write = ["mangocode-query/tool-todo-write", "mangocode-tools/tool-todo-write", "mangocode-tui/tool-todo-write"]
tool-tool-log-read = ["mangocode-query/tool-tool-log-read", "mangocode-tools/tool-tool-log-read", "mangocode-tui/tool-tool-log-read"]
tool-tool-search = ["mangocode-query/tool-tool-search", "mangocode-tools/tool-tool-search", "mangocode-tui/tool-tool-search"]
tool-update-goal = ["mangocode-query/tool-update-goal", "mangocode-tools/tool-update-goal", "mangocode-tui/tool-update-goal"]
tool-view-image = ["mangocode-query/tool-view-image", "mangocode-tools/tool-view-image", "mangocode-tui/tool-view-image"]
tool-web-fetch = ["mangocode-query/tool-web-fetch", "mangocode-tools/tool-web-fetch", "mangocode-tui/tool-web-fetch"]
tool-web-search = ["mangocode-query/tool-web-search", "mangocode-tools/tool-web-search", "mangocode-tui/tool-web-search"]
tool-write = ["mangocode-query/tool-write", "mangocode-tools/tool-write", "mangocode-tui/tool-write"]
# Pass-through features from cc-core
ultraplan = ["mangocode-core/ultraplan"]

[dependencies]
mangocode-core = { workspace = true }
mangocode-api = { workspace = true }
mangocode-tools = { workspace = true, default-features = false }
mangocode-query = { workspace = true, default-features = false }
mangocode-mcp = { workspace = true }
mangocode-tui = { workspace = true, default-features = false }
mangocode-plugins = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
dirs = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true }
arboard = { version = "3", default-features = false }
urlencoding = { workspace = true }
open = { workspace = true }
qrcode = { workspace = true }
mangocode-bridge = { workspace = true }
hostname = "0.4"
rpassword = "7"
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures = { workspace = true }
once_cell = { workspace = true }
parking_lot = { workspace = true }
base64 = { workspace = true }
tempfile = { workspace = true }
